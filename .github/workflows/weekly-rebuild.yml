name: Weekly Rebuild

on:
  schedule:
    # Every Sunday at 11:59 PM UTC
    - cron: '59 23 * * 0'
  workflow_dispatch: # Allow manual triggering from GH UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.NETLIFY_BUILD_HOOK }}" \
            -d '{}'
